# Codemagic: build do APK deste projeto + testes E2E (Selenium + Appium) a partir de repositório externo.
# Docs: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/
#
# Ajuste antes de usar em produção:
# - Pay-as-you-go: use linux_x2 (abaixo) para Docker + KVM + emulador Android. Sem billing, use mac_mini_m2 (grátis limitado) ou troque o instance_type.
# - linux_x4 = mais CPU/RAM (custo maior por minuto no pay-as-you-go; conferir doc/pricing).
# - TEST_REPO_URL deve apontar para o repo de testes (ex.: native-appium-taxi). Perfil -Pdockerized-web injeta SELENIUM_REMOTE_URL=http://localhost:4444/wd/hub (alinhado ao Selenium 4 standalone neste workflow).
# - Para o APK chegar nos testes, o pom do repo de testes deve repassar a propriedade (ver comentário no script "Run E2E").
# - Tempo de boot do emulador + Appium é alto; aumente max_build_duration se necessário.
# - Assinatura compartilhada com Espresso (opcional nas variáveis do app Codemagic, marca como secret):
#   KEYSTORE_BASE64 (base64 do .jks, uma linha), KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS (ex.: my-debug-alias).
#   Não defina KEYSTORE_PATH_IN_CONTAINER vazio no Codemagic: pode impedir CM_ENV — o YAML grava também
#   config/.ci-espresso-keystore.path no passo de build como fallback estável entre steps.
#   O assembleDebug passa -PciSharedDebugKeystorePath=... (-P também para store/alias/password)
#   para o Gradle alinhar assinatura ao Espresso quando env/daemon falham só com variáveis.
#   Grupos da UI (Environment variables) precisam ser importados em environment.groups — ver doc Codemagic.
#   Após clone, aplica-se ci/e2e-appium-http-timeout.patch no repo de testes (HTTP read timeout do
#   java-client durante o rebuild do Espresso; evita “socket hang up”). Atualize o patch se o arquivo
#   AndroidDriverManager.java do repositório de testes divergir. Patch: ClientConfig read timeout,
#   appium:showGradleLog e no servidor Appium codemagic usa --keep-alive-timeout / --request-timeout.

workflows:
  full-stack-e2e:
    name: Build Taxi APK & multi-platform E2E
    # linux_x2: 8 vCPU / 32 GB (doc). Pay-as-you-go cobra minutos de Linux (ver Billing na Codemagic).
    # Para grátis sem Linux: volte a mac_mini_m2 (sem AVD confiável na doc).
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      java: 17
      node: latest
      # Importa KEYSTORE_BASE64, KEY_ALIAS, KEYSTORE_PASSWORD, KEY_PASSWORD (grupo no app Codemagic).
      # O nome deve coincidir com o Variable group no painel (ex.: GENERAL_CREDENTIALS).
      groups:
        - GENERAL_CREDENTIALS
      # ubuntu: 24.04   # opcional para Linux; ver doc "Build machine and software versions"
      vars:
        # Repo Maven (artifactId native-appium-taxi no pom que você enviou)
        TEST_REPO_URL: "https://github.com/cristianopcortez/native-appium-demo.git"
        # Caminho fixo do debug APK deste módulo app/ (evita find com múltiplos APKs)
        APK_REL_PATH: "app/build/outputs/apk/debug/app-debug.apk"
        SELENIUM_IMAGE: "selenium/standalone-chrome:4.27.0"
        # Linux Codemagic não inclui mvn no PATH; usado no passo Run E2E se não houver mvnw no repo de testes
        MAVEN_VERSION: "3.9.9"
    scripts:
      - name: Prepare Android SDK for Gradle
        script: |
          set -e
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=$SDK" > "$CM_BUILD_DIR/local.properties"

      - name: Build debug APK
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          chmod +x ./gradlew
          # Isolate this CI build from any stale Gradle daemon/state (can drop -P CI props visually).
          ./gradlew --stop 2>/dev/null || true
          KEYSTORE_DECODE_PATH=""
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            mkdir -p config
            KEYSTORE_DECODE_PATH="$CM_BUILD_DIR/config/ci-debug-keystore.jks"
            # Codemagic / paste issues: CR/LF, tabs, stray spaces → GNU base64 "invalid input".
            # Expect raw base64 of the binary .jks (NOT certutil PEM with BEGIN/END lines).
            TMP_B64="$(mktemp)"
            printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n\t ' > "$TMP_B64"
            decode_ok=""
            if base64 -d < "$TMP_B64" > "$KEYSTORE_DECODE_PATH" 2>/dev/null \
              && [ -s "$KEYSTORE_DECODE_PATH" ]; then
              decode_ok=1
            elif base64 -di < "$TMP_B64" > "$KEYSTORE_DECODE_PATH" 2>/dev/null \
              && [ -s "$KEYSTORE_DECODE_PATH" ]; then
              decode_ok=1
            elif command -v openssl >/dev/null 2>&1 \
              && openssl base64 -d -A -in "$TMP_B64" -out "$KEYSTORE_DECODE_PATH" 2>/dev/null \
              && [ -s "$KEYSTORE_DECODE_PATH" ]; then
              decode_ok=1
            fi
            rm -f "$TMP_B64"
            if [ -z "$decode_ok" ]; then
              echo "Could not decode KEYSTORE_BASE64. Fix the secret value:"
              echo "  • Must be raw base64 of the .jks bytes (single line or strip newlines)."
              echo "  • Do NOT use PEM text (BEGIN/END)."
              echo "  • Windows: [Convert]::ToBase64String([IO.File]::ReadAllBytes('my.jks')) | Set-Clipboard"
              exit 1
            fi
            chmod 600 "$KEYSTORE_DECODE_PATH"
            export SHARED_DEBUG_KEYSTORE_PATH="$KEYSTORE_DECODE_PATH"
            echo "SHARED_DEBUG_KEYSTORE_PATH=$KEYSTORE_DECODE_PATH" >> "$CM_ENV"
            echo "KEYSTORE_PATH_IN_CONTAINER=$KEYSTORE_DECODE_PATH" >> "$CM_ENV"
            printf '%s' "$KEYSTORE_DECODE_PATH" > "$CM_BUILD_DIR/config/.ci-espresso-keystore.path"
          fi
          # -P no :app: repassa path + credenciais ao Gradle (daemon/ordem de avaliação pode ignorar só env).
          GRADLE_CI_KS_ARGS=()
          if [ -n "${KEYSTORE_DECODE_PATH:-}" ] && [ -f "$KEYSTORE_DECODE_PATH" ]; then
            if [ -z "${KEYSTORE_PASSWORD:-}" ] || [ -z "${KEY_ALIAS:-}" ] || [ -z "${KEY_PASSWORD:-}" ]; then
              echo "Keystore decode succeeded but KEYSTORE_PASSWORD, KEY_ALIAS ou KEY_PASSWORD não estão definidos (grupo Codemagic / secrets)."
              exit 1
            fi
            # Redundância ao -P: o Gradle também lê ORG_GRADLE_PROJECT_<prop> como project property (útil em daemons/multi-step).
            export ORG_GRADLE_PROJECT_ciSharedDebugKeystorePath="$KEYSTORE_DECODE_PATH"
            GRADLE_CI_KS_ARGS=(
              -PciSharedDebugKeystorePath="$KEYSTORE_DECODE_PATH"
              -PciSharedDebugStorePassword="${KEYSTORE_PASSWORD}"
              -PciSharedDebugKeyAlias="${KEY_ALIAS}"
              -PciSharedDebugKeyPassword="${KEY_PASSWORD}"
            )
          fi
          ./gradlew clean assembleDebug "${GRADLE_CI_KS_ARGS[@]}"
          APK_PATH="$CM_BUILD_DIR/$APK_REL_PATH"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK não encontrado em $APK_PATH"
            exit 1
          fi
          if [ -n "${KEYSTORE_DECODE_PATH:-}" ] && [ -f "$KEYSTORE_DECODE_PATH" ]; then
            SDK_CI="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
            BT="$(ls -d "$SDK_CI"/build-tools/* 2>/dev/null | sort -V | tail -1)"
            if [ -z "$BT" ] || [ ! -x "$BT/apksigner" ]; then
              echo "Android SDK build-tools não contém apksigner (ANDROID_SDK_ROOT=$SDK_CI)."
              exit 1
            fi
            # Gradle/AGP pode ainda assim gerar APK debug com keystore default; Espresso usa o keystore CI
            # via espressoBuildConfig. Re-assina para os certificados coincidirem no Appium.
            echo "Reassinando app-debug.apk com o keystore CI (alinhamento ao servidor Espresso)..."
            TMP_APK="$(mktemp "${TMPDIR:-/tmp}/app-debug-resign.XXXXXX")"
            cp -f "$APK_PATH" "$TMP_APK"
            SIGN_OK=""
            if "$BT/apksigner" sign --ks "$KEYSTORE_DECODE_PATH" \
              --ks-pass "pass:${KEYSTORE_PASSWORD}" \
              --ks-key-alias "${KEY_ALIAS}" \
              --key-pass "pass:${KEY_PASSWORD}" \
              --out "$APK_PATH" \
              "$TMP_APK"; then
              SIGN_OK=1
            fi
            rm -f "$TMP_APK"
            if [ -z "$SIGN_OK" ]; then
              echo "apksigner sign falhou; confira alias/senhas do keystore Codemagic."
              exit 1
            fi
            echo "Verificação de assinatura do APK de debug (esperado: certificado não-default / alinhado ao Espresso CI):"
            VERIFY_OUT="$("$BT/apksigner" verify --print-certs "$APK_PATH" 2>/dev/null || true)"
            echo "$VERIFY_OUT" | head -25 || true
            DEF_SIG=""
            if echo "$VERIFY_OUT" | grep -Fiq "default certificate"; then
              DEF_SIG=1
            fi
            if echo "$VERIFY_OUT" | grep -Eiq "CN=Android Debug"; then
              DEF_SIG=1
            fi
            if [ -n "$DEF_SIG" ]; then
              echo ""
              echo "ERRO: app-debug.apk parece assinado com certificado DEBUG PADRÃO após resign (confira alias/senha do mesmo .jks usado pelo Espresso)."
              exit 1
            fi
          fi
          echo "APK_PATH=$APK_PATH" >> "$CM_ENV"
          echo "Built APK: $APK_PATH"

      - name: Start Selenium (standalone Chrome)
        script: |
          set -e
          docker rm -f selenium-standalone 2>/dev/null || true
          docker run -d --name selenium-standalone --shm-size=2g -p 4444:4444 -p 7900:7900 "$SELENIUM_IMAGE"
          # Aguarda o Grid/WebDriver ficar disponível (ajuste a URL se o repo de testes usar outra porta/path)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4444/wd/hub/status >/dev/null 2>&1 || curl -sf http://localhost:4444/status >/dev/null 2>&1; then
              echo "Selenium responder em http://localhost:4444"
              break
            fi
            sleep 2
          done

      - name: Clone test project
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          rm -rf tests_project
          git clone --depth 1 "$TEST_REPO_URL" tests_project
          if ! git -C tests_project apply "$CM_BUILD_DIR/ci/e2e-appium-http-timeout.patch"; then
            echo "Patch ci/e2e-appium-http-timeout.patch não aplicou (repo de testes mudou?). Commit no Taxi ou alinhe revisão."
            exit 1
          fi
          grep -q "ClientConfig" tests_project/src/main/java/br/com/ccortez/drivers/AndroidDriverManager.java \
            && grep -q "showGradleLog" tests_project/src/main/java/br/com/ccortez/drivers/AndroidDriverManager.java \
            || { echo "Patch parece não ter sido aplicado ao AndroidDriverManager"; exit 1; }

      - name: Appium, AVD e boot do emulador
        script: |
          set -e
          # cmdline-tools não ficam no PATH por padrão no Linux Codemagic — usar caminho explícito.
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK" ]; then
            SDK="/usr/local/share/android-sdk"
          fi
          CMDBIN=""
          for cand in "$SDK/cmdline-tools/latest/bin" "$SDK/cmdline-tools/bin"; do
            if [ -x "$cand/sdkmanager" ]; then
              CMDBIN="$cand"
              break
            fi
          done
          if [ -z "$CMDBIN" ] && [ -x "/usr/local/share/android-sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDK="/usr/local/share/android-sdk"
            CMDBIN="$SDK/cmdline-tools/latest/bin"
          fi
          if [ -z "$CMDBIN" ]; then
            echo "sdkmanager não encontrado. ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ANDROID_HOME=$ANDROID_HOME"
            find "$SDK" -name sdkmanager -type f 2>/dev/null | head -5 || true
            exit 1
          fi
          export PATH="$CMDBIN:$SDK/platform-tools:$SDK/emulator:$PATH"
          SDKMANAGER="$CMDBIN/sdkmanager"
          AVDMANAGER="$CMDBIN/avdmanager"
          echo "Using SDK=$SDK cmdline-tools=$CMDBIN"

          npm install -g appium
          # Test project uses automationName espresso (not only UiAutomator2).
          appium driver install uiautomator2
          # Espresso driver 8.x builds espresso-server with bundled Gradle 9 + AGP 9; the
          # test suite no longer pins Gradle/AGP in espressoBuildConfig to the app’s AGP.
          appium driver install espresso
          appium driver list --installed

          # Licenças + imagem do sistema (API 33 alinhada a minSdk/target comuns; ajuste se o repositório de testes exigir outra API)
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platform-tools" "platforms;android-33" "emulator" "system-images;android-33;google_apis;x86_64"

          echo "no" | "$AVDMANAGER" create avd -n cm_test_device -k "system-images;android-33;google_apis;x86_64" --force

          nohup "$SDK/emulator/emulator" -avd cm_test_device \
            -no-snapshot -no-audio -no-window \
            -gpu swiftshader_indirect \
            -accel on \
            >/dev/null 2>&1 &
          adb wait-for-device
          # Aguarda boot completo (alternativa ao utilitário android-wait-for-emulator em algumas imagens)
          boot=""
          for i in $(seq 1 180); do
            boot=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
            if [ "$boot" = "1" ]; then
              echo "Emulador pronto."
              break
            fi
            sleep 2
          done
          if [ "$boot" != "1" ]; then
            echo "Timeout aguardando sys.boot_completed."
            exit 1
          fi

          # Espresso rebuild spawns Gradle: cap workers / heap para reduzir OOM neste mesmo runner.
          export ANDROID_SDK_ROOT="$SDK"
          export ANDROID_HOME="$SDK"
          export NODE_OPTIONS="${NODE_OPTIONS:---max-old-space-size=6144}"
          export GRADLE_OPTS="${GRADLE_OPTS:--Dorg.gradle.workers.max=2 -Xmx3072m -XX:MaxMetaspaceSize=512m}"

          APP_LOG="$CM_BUILD_DIR/appium.log"
          APP_NOHUP="$CM_BUILD_DIR/appium-nohup.log"
          rm -f "$APP_LOG" "$APP_NOHUP"
          touch "$APP_LOG"
          # Long Espresso Gradle rebuild: bump Appium HTTP timeouts (defaults can drop the connection).
          nohup appium \
            --keep-alive-timeout 7200 \
            --request-timeout 7200 \
            --log-timestamp \
            --log-level info \
            --log "$APP_LOG" >>"$APP_NOHUP" 2>&1 &
          appium_pid="$!"
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4723/status >/dev/null 2>&1; then
              echo "Appium pronto em http://127.0.0.1:4723"
              break
            fi
            if ! kill -0 "$appium_pid" 2>/dev/null; then
              echo "Appium encerrou antes de responder (pid $appium_pid). Últimas linhas:"
              tail -n 80 "$APP_LOG" 2>/dev/null || true
              tail -n 80 "$APP_NOHUP" 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          if ! curl -sf http://127.0.0.1:4723/status >/dev/null 2>&1; then
            echo "Timeout aguardando Appium /status"
            tail -n 120 "$APP_LOG" 2>/dev/null || true
            tail -n 120 "$APP_NOHUP" 2>/dev/null || true
            exit 1
          fi

      - name: Run E2E tests (Maven)
        script: |
          set -e
          cd "$CM_BUILD_DIR/tests_project"
          # Maven: imagens Linux não trazem mvn. Preferir wrapper do repo de testes; senão instalar Apache Maven.
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            MVN_CMD="./mvnw"
          else
            if ! command -v mvn >/dev/null 2>&1; then
              MAVEN_BASE="apache-maven-${MAVEN_VERSION}"
              MAVEN_TAR="${MAVEN_BASE}-bin.tar.gz"
              # dlcdn.apache.org path is unreliable in CI; archive + downloads are canonical.
              U1="https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/${MAVEN_TAR}"
              U2="https://downloads.apache.org/maven/maven-3/${MAVEN_VERSION}/binaries/${MAVEN_TAR}"
              if ! curl -fsSL "$U1" | tar -xz -C /tmp; then
                curl -fsSL "$U2" | tar -xz -C /tmp
              fi
              export PATH="/tmp/${MAVEN_BASE}/bin:$PATH"
            fi
            MVN_CMD="mvn"
          fi
          $MVN_CMD -version
          # Espresso precisa do mesmo keystore que o app-debug.apk. CM_ENV pode ser sobrescrito por
          # uma variável vazia KEYSTORE_PATH_IN_CONTAINER no Codemagic; ler path gravado pelo build.
          KEYSTORE_PATH_FILE="$CM_BUILD_DIR/config/.ci-espresso-keystore.path"
          if [ -f "$KEYSTORE_PATH_FILE" ]; then
            export KEYSTORE_PATH_IN_CONTAINER="$(tr -d '\r\n' < "$KEYSTORE_PATH_FILE")"
          fi
          # Com KEYSTORE_BASE64 no build, KEYSTORE_PATH_IN_CONTAINER veio acima ou no CM_ENV. Senão:
          if [ -z "${KEYSTORE_PATH_IN_CONTAINER:-}" ]; then
            export KEYSTORE_PATH_IN_CONTAINER="${HOME}/.android/debug.keystore"
            export KEYSTORE_PASSWORD=android
            export KEY_ALIAS=androiddebugkey
            export KEY_PASSWORD=android
          fi
          if [ ! -f "$KEYSTORE_PATH_IN_CONTAINER" ]; then
            echo "Keystore não encontrado: $KEYSTORE_PATH_IN_CONTAINER"
            exit 1
          fi
          # Repo de testes: DriverTestConfig lê appium.app (Surefire) e SELENIUM_REMOTE_URL.
          # O perfil dockerized-web define default /home/androidusr/... para Docker local; aqui
          # -Dappium.app sobrescreve com o APK recém-gerado neste build (caminho no runner Codemagic).
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          export ANDROID_SDK_ROOT="${SDK:-/usr/local/share/android-sdk}"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          set +e
          $MVN_CMD -B test -Pdockerized-web -Dappium.app="$APK_PATH"
          mvn_exit=$?
          set -e
          if [ "$mvn_exit" -ne 0 ]; then
            echo ""
            echo "======= Diagnóstico E2E (Appium / Espresso) — veja também artifacts appium*.log ======="
            tail -n 300 "$CM_BUILD_DIR/appium.log" 2>/dev/null || echo "(sem appium.log)"
            echo ""
            tail -n 200 "$CM_BUILD_DIR/appium-nohup.log" 2>/dev/null || echo "(sem appium-nohup.log)"
            echo ""
            echo "Diretórios espresso-server em /tmp (Gradle do driver):"
            ls -la /tmp 2>/dev/null | grep -E 'espresso|appium' || true
            for d in /tmp/espresso-server-*; do
              [ -d "$d" ] || continue
              echo "--- últimos arquivos sob $d ---"
              find "$d" -maxdepth 5 -type f \( -name "*.log" -o -name "hs_err*.log" \) 2>/dev/null | head -10
            done
            exit "$mvn_exit"
          fi
        test_report: tests_project/target/surefire-reports/*.xml

    artifacts:
      - app/build/outputs/apk/**/*.apk
      - appium.log
      - appium-nohup.log
